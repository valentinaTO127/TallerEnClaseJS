<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/style.css">
    <title>Salario</title>
</head>
<body>

    <h1>Simulador de Nomina Laboral</h1>
    <p>Ingrese sus datos</p>
    <form method="POST" id="datosGenerales">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" maxlength="100" placeholder="Nicol Arias" required>

        <label for="edad">Edad:</label>
        <input type="text" id="edad" name="edad" maxlength="3" placeholder="30" required>

        <label for="tipoDocumento">Tipo de documento:</label>
        <select name="tipoDocumento" id="tipoDocumento">
            <option value="RC">RC</option>
            <option value="TI">TI</option>
            <option value="CC" selected>CC</option>
            <option value="CE">CE</option>
            <option value="PP">PP</option>
        </select>

        <label for="numeroDocumento">Numero de documento:</label>
        <input type="text" id="numeroDocumento" name="numeroDocumento" placeholder="1022555888" maxlength="15" required>

        <button type="submit">Enviar</button>
    </form>

 
    <form method="POST" id="datosSalariales">
        <label for="salario">Salario</label>
        <input type="text" id="salario" name="salario" placeholder="4000000" maxlength="8" required>

        <label for="comisiones">Comisiones:</label>
        <input type="text" id="comisiones" name="comisiones" placeholder="30000" required>

        <label for="horasExtra">Horas extra:</label>
        <input type="text" id="horasExtra" name="horasExtra" maxlength="2" placeholder="10" required>

        <label for="nivelRiesgo">Nivel de riesgo:</label>
        <select name="nivelRiesgo" id="nivelRiesgo">
            <option value="0">Nivel I – Riesgo Mínimo</option>
            <option value="1">Nivel II – Riesgo Bajo</option>
            <option value="2">Nivel III – Riesgo Medio</option>
            <option value="3">Nivel IV – Riesgo Alto</option>
            <option value="4">Nivel V – Riesgo Máximo</option>
        </select>

        <button type="submit">Enviar</button>
    </form>

    <ul id="errores"></ul>
    <section id="resultados"><p id="resultadosP"></p>
    </section>

    <script src="script.js"></script>
</body>
</html>
